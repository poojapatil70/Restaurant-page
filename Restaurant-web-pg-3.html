<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins' ;
        }

        /* Background Image */
        .hero {
            background: url('restaurant_bg_no_text.png') no-repeat center/cover;
            height: 100vh;
            position: relative;
        }

        /* Dark Overlay */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: white;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            color: black;
            text-align: center;
            top: 10%;
        }

        /* Heading */
        .content h1 {
            font-size: 60px;
            color: #ffc107;
            font-weight: 600;
        }

        /* Info Section */
        .info-box {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 30px;
        }

        .info {
            text-align: center;
        }

        .info i {
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 50%;
            color: #ffc107;
            margin-bottom: 10px;
        }

        /* Form Card */
        .form-box {
            background: white;
            color: black;
            border-radius: 15px;
            padding: 30px;
            margin-top: 40px;
        }

        /* Button */
        .btn-custom {
            background: #ffc107;
            border: none;
        }

        .btn-custom:hover {
            background: #e0a800;
        }

        .map {
            margin-top:40px ;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg ">
        <div class="container">
            <img src="https://img.freepik.com/free-vector/gradient-restaurant-logo-design_23-2151257068.jpg?semt=ais_hybrid&w=740&q=80"
                alt="" height="60" width="60">
            <a class="navbar-brand" href="#">Foodie</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link " href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Restaurant-web-pg-2.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link active " href="Restaurant-web-pg-3.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero">

        <div class="container content">

            <!-- Heading -->
            <h1>Contact Us</h1>
            <p>We'd love to hear from you. Reach out for reservations or inquiries.</p>

            <!-- Contact Info -->
            <div class="info-box">

                <div class="info">
                    <i class="fas fa-map-marker-alt"></i>
                    <h6>Location</h6>
                    <p>Nagpur, India</p>
                </div>

                <div class="info">
                    <i class="fas fa-phone"></i>
                    <h6>Phone</h6>
                    <p>+91 9876543210</p>
                </div>

                <div class="info">
                    <i class="fas fa-envelope"></i>
                    <h6>Email</h6>
                    <p>foodie@email.com</p>
                </div>

                <div class="info">
                    <i class="fas fa-clock"></i>
                    <h6>Opening Hours</h6>
                    <p>10 AM - 11 PM</p>
                </div>

            </div>

            <!-- Form -->
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="form-box">

                        <h4 class="mb-4">Send Message</h4>

                        <form>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <input type="text" class="form-control" placeholder="Your Name">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <input type="email" class="form-control" placeholder="Your Email">
                                </div>
                            </div>

                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Phone">
                            </div>

                            <div class="mb-3">
                                <textarea class="form-control" rows="4" placeholder="Your Message"></textarea>
                            </div>

                            <button class="btn btn-custom w-100">Send Message</button>
                        </form>

                    </div>
                </div>
            </div>
            
        </div>
        
    </div>
    <!-- Map -->
  <div class="container " >
    <div class="">
        <iframe src="https://maps.google.com/maps?q=Nagpur&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="400">
    </iframe>
    </div>
    
  </div>
    

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 Foodie Restaurant | All Rights Reserved</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
